# what is the goal of your workflow
# Goal: whenever someone changes the pyhton code , 
#the linter will check if the syntax , format,indentation is correct or not
name: Auto Linter

on:
  push:
    paths: "*.py"


jobs:
  code:
    runs-on: ubuntu-latest
    # this step will automatically clone the code of the current branch into the runner
    steps:
      - name: Checkout/clone the code
        uses: actions/checkout@v7
      # this step will install the linting tool
      - name: Install Linter
        run: pip install ruff
      # this stepp will run the linter
      - name: check the file for linting
        run: ruff check .
        
