# Workflow
#should have name
name: Hello
# on tells when the workflow should run
on:
  workflow_dispatch: 

# jobs tells what the workflow should do , there can be one or more than one jobs

jobs:
  # 1st job (given indentation)
  say-hello:
    # Creates an ephermal container with ubuntu running
    runs-on: ubuntu-latest
    # that ephermal container wil have steps to execut , hence name those steps and use run : run has the command
    steps:
      - name: say hello to everyone
        run: echo "Hello Dosto"
      

